name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ~/innovator

            # Pull latest code from the triggering branch
            git pull origin ${{ github.ref_name }}

            # Check for Docker Compose V2, fallback to V1 if needed
            if docker compose version > /dev/null 2>&1; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi

            echo "Using $DOCKER_CMD for deployment"

            # Deploy services
            $DOCKER_CMD -f docker-compose.prod.yml down --remove-orphans
            $DOCKER_CMD -f docker-compose.prod.yml build
            $DOCKER_CMD -f docker-compose.prod.yml up -d

            # Run migrations safely on auth_service
            $DOCKER_CMD -f docker-compose.prod.yml exec -T auth_service \
              python manage.py migrate || true

            # Cleanup unused images
            docker image prune -f

            echo "Deployment successful."